<div class="admin-certifications">
  <div class="header-content">
    <div class="header-text">
      <h1><mat-icon>workspace_premium</mat-icon> Certifications</h1>
      <p>All freelancer certifications</p>
    </div>
    <div class="stat-chip">{{ certifications().length }} Certifications</div>
  </div>

  <div *ngIf="loading()" class="loading-state">
    <mat-icon class="spin">autorenew</mat-icon>
  </div>

  <mat-card *ngIf="!loading()">
    <mat-card-content>
      <table mat-table [dataSource]="certifications()" class="cert-table">

        <ng-container matColumnDef="freelancer">
  <th mat-header-cell *matHeaderCellDef>Freelancer</th>
  <td mat-cell *matCellDef="let c">{{ getName(c.userId) }}</td>
</ng-container>

        <ng-container matColumnDef="testTitle">
          <th mat-header-cell *matHeaderCellDef>Certification</th>
          <td mat-cell *matCellDef="let c"><strong>{{ c.testTitle }}</strong></td>
        </ng-container>

        <ng-container matColumnDef="score">
          <th mat-header-cell *matHeaderCellDef>Score</th>
          <td mat-cell *matCellDef="let c">
            <span class="score-badge" [style.color]="getScoreColor(c.score)">
              {{ c.score }}%
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let c">{{ c.date | date:'dd/MM/yyyy' }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
