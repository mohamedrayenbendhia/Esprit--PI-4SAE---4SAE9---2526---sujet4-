spring:
  application:
    name: organization-service
  cloud:
    config:
      enabled: true
      uri: http://localhost:8888
      fail-fast: true
  config:
    import: configserver:http://localhost:8888

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

geocoding:
  nominatim:
    base-url: https://nominatim.openstreetmap.org
    user-agent: SmartFreelance/1.0
    timeout-seconds: 10
