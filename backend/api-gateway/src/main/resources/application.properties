spring.application.name=api-gateway
server.port=8080

# Eureka Client Configuration
eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===================== ROUTES =====================

# --- User Service ---
spring.cloud.gateway.routes[0].id=module-user
spring.cloud.gateway.routes[0].uri=lb://SERVICE-USER
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**,/api/users/**,/api/admin/users/**,/api/kyc/**,/api/kyc-verifications/**,/api/freelance-profiles/**,/uploads/**

# --- Job Offers Service ---
spring.cloud.gateway.routes[4].id=service-joboffer
spring.cloud.gateway.routes[4].uri=lb://SERVICE-JOBOFFER
# On garde tout SAUF les notifications qui ont migr�
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/job-offers/**,/api/applications/**,/api/invitations/**,/api/recommendations/**,/api/reputation/**,/api/audit-logs/**
# --- Competence Service ---
spring.cloud.gateway.routes[1].id=module-competence
spring.cloud.gateway.routes[1].uri=lb://module-competence
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/admin/skills/**,/api/freelancer/skills/**,/api/client/skills/**

# --- Portfolio Service ---
spring.cloud.gateway.routes[2].id=module-portfolio
spring.cloud.gateway.routes[2].uri=lb://module-portfolio
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/admin/portfolios/**,/api/freelancer/portfolios/**,/api/client/portfolios/**

# --- Certification Service ---
spring.cloud.gateway.routes[3].id=module-certification
spring.cloud.gateway.routes[3].uri=lb://module-certification
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/admin/tests/**,/api/admin/certifications/**,/api/freelancer/tests/**,/api/freelancer/certifications/**,/api/client/certifications/**

# --- Projects Service ---
spring.cloud.gateway.routes[5].id=service-projects
spring.cloud.gateway.routes[5].uri=lb://SERVICE-PROJECTS
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/projects/**,/api/milestones/**,/api/deliverables/**,/api/chat/**

# --- Evaluation Service ---
spring.cloud.gateway.routes[6].id=evaluation
spring.cloud.gateway.routes[6].uri=lb://evaluation
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/client/evaluations/**,/api/freelancer/evaluations/**,/api/freelancer/badges/**,/api/client/badges/**,/api/admin/evaluations/**

# --- Contrat Service ---
spring.cloud.gateway.routes[7].id=contrat
spring.cloud.gateway.routes[7].uri=lb://contrat
spring.cloud.gateway.routes[7].predicates[0]=Path=/contrat_backend/**

# --- Complaint Service ---
spring.cloud.gateway.routes[8].id=complaint-service
# Change this to uppercase to match Eureka dashboard
spring.cloud.gateway.routes[8].uri=lb://COMPLAINT-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/complaints/**,/api/support-messages/**,/api/mediation/**,/api/response-templates/**,/api/nps/**,/api/risk/**,/api/sla/**

# --- Organization Service ---
spring.cloud.gateway.routes[9].id=organization-service
spring.cloud.gateway.routes[9].uri=lb://ORGANIZATION-SERVICE
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/organizations/**,/api/admin/organizations/**,/api/org-invitations/**,/api/collab-offers/**,/api/gdpr/**

# --- Recommendation AI Service (Python) ---
spring.cloud.gateway.routes[10].id=recommendation-ai
spring.cloud.gateway.routes[10].uri=lb://RECOMMENDATION-AI
spring.cloud.gateway.routes[10].order=-1
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/recommendations/health,/api/recommendations/for-job/**,/api/recommendations/sync/freelancer,/api/recommendations/sync/job

# --- Notification Service (D�di�) ---
spring.cloud.gateway.routes[11].id=notification-service
spring.cloud.gateway.routes[11].uri=lb://notification-service
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/notifications/**

# 1. CORS Configuration
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200,http://localhost:4201
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].max-age=3600

# 2. CORRECTIF CRUCIAL pour le double CORS
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# ===============================
# DevOps & Monitoring (Actuator)
# ===============================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}