# ===============================
# Application Info
# ===============================
server.port=9095
spring.application.name=organization-service

# ===============================
# MySQL Database Configuration
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/smart_freelance_organizations?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# File Upload
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ===============================
# Flyway
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Mail Configuration
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=support.nexlance@gmail.com
spring.mail.password=rargejboxtdifryf
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Async executor pour l'envoi d'emails
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=org-mail-

# ===============================
# Eureka
# ===============================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ===============================
# Organization Service
# ===============================
organization.upload-dir=uploads/organizations
organization.service-url=http://localhost:9095

# ===============================
# External Services
# ===============================
user-service.url=http://localhost:8084
frontend.base-url=http://localhost:4200
notifications.service-url=http://localhost:9090/api/notifications

# ===============================
# Logging
# ===============================
logging.level.com.smartfreelance.organizationservice=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.mail=DEBUG

# Exposition des endpoints pour Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}