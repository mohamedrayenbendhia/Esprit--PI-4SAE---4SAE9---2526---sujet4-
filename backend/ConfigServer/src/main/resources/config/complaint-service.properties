
# ===============================
# Application Info
# ===============================
server.port=8092

# ===============================
# MySQL Database Configuration
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/smart_freelance_complaints?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# File Upload
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ===============================
# Flyway
# ===============================
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=3

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Mail Configuration
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=support.nexlance@gmail.com
spring.mail.password=rargejboxtdifryf
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Async executor pour l'envoi d'emails
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=mail-

# ===============================
# Eureka
# ===============================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===============================
# Complaint Service
# ===============================
complaint.upload-dir=uploads/complaints
complaint.service-url=http://localhost:8092

# ===============================
# Hugging Face AI (complaint classification)
# ===============================
hf.api-token=${HF_API_TOKEN:your-huggingface-token-here}
hf.model-url=https://api-inference.huggingface.co/models/joeddav/xlm-roberta-large-xnli

# ===============================
# External Services
# ===============================
user-service.url=http://localhost:8084
frontend.base-url=http://localhost:4200
notifications.service-url=http://localhost:9090/api/notifications

# ===============================
# Logging
# ===============================
logging.level.com.smartfreelance.complaint=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.mail=DEBUG

# Inside complaint-service.properties
spring.application.name=complaint-service
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

# Exposition des endpoints pour Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}