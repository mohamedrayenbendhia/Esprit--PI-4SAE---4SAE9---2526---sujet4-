# ===============================
# Application Info
# ===============================
spring.application.name=Contrat_Backend
server.port=8086
server.servlet.context-path=/contrat_backend

# ===============================
# MySQL Database Configuration
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/Contrat_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Hikari Connection Pool
# ===============================
spring.datasource.hikari.maximum-pool-size=10

# ===============================
# Swagger / Springdoc (optionnel)
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true

# ===============================
# Eureka Client (optionnel - commenté par défaut)
# ===============================
eureka.client.enabled=false
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
#eureka.instance.prefer-ip-address=true