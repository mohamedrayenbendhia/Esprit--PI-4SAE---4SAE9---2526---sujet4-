spring.application.name=service-user

# Server Configuration
server.port=8084

# Eureka Client Configuration
eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/nexlance_service_user?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.tn.esprit.pi.nexlance=DEBUG
# Keycloak Configuration
keycloak.enabled=false
keycloak.realm=nexlance-realm
keycloak.auth-server-url=http://localhost:8180
keycloak.ssl-required=none
keycloak.resource=nexlance-client
keycloak.credentials.secret=your-client-secret-here
keycloak.use-resource-role-mappings=true
keycloak.bearer-only=true

# Spring Security OAuth2 Resource Server
#spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/nexlance-realm
#spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/nexlance-realm/protocol/openid-connect/certs

# Keycloak Admin Client
keycloak.admin.server-url=http://localhost:8180
keycloak.admin.realm=master
keycloak.admin.client-id=admin-cli
keycloak.admin.username=admin
keycloak.admin.password=admin

# JWT Configuration (for simple auth without Keycloak)
jwt.secret=NexLanceSecretKeyForJWTTokenGenerationAndValidation2026
jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2KB
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=-1

# Upload directory
file.upload-dir=uploads

# Backend URL for file access
backend.url=http://localhost:8084