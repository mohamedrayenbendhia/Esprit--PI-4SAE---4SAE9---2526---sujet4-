spring:
  application:
    name: organization-service

  datasource:
    url: jdbc:mysql://localhost:3306/smart_freelance_organizations?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:support.nexlance@gmail.com}
    password: ${MAIL_PASSWORD:kgpzuvybcxtymhnu}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 100
      thread-name-prefix: org-mail-

server:
  port: 9095

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

user-service:
  url: http://localhost:8084

notifications:
  service-url: http://localhost:9090/api/notifications

frontend:
  base-url: http://localhost:4200

logging:
  level:
    com.smartfreelance.organizationservice: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.mail: DEBUG
