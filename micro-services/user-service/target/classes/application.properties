## ============================================================
## USER-SERVICE (NexLance) ? application.properties
## Modifications apportees :
##   1. spring.application.name : NexLance ? user-service
##   2. Ajout eureka.client.*
##   3. Ajout eureka.instance.*
## ============================================================

## ? MODIFIE : nom du service tel qu il apparait dans Eureka et le Gateway
spring.application.name=user-service

# Server Configuration
server.port=8084

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/nexlance_service_user?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.tn.esprit.pi.nexlance=DEBUG

# Keycloak Configuration
keycloak.enabled=false
keycloak.realm=nexlance-realm
keycloak.auth-server-url=http://localhost:8180
keycloak.ssl-required=none
keycloak.resource=nexlance-client
keycloak.credentials.secret=your-client-secret-here
keycloak.use-resource-role-mappings=true
keycloak.bearer-only=true

# Keycloak Admin Client
keycloak.admin.server-url=http://localhost:8180
keycloak.admin.realm=master
keycloak.admin.client-id=admin-cli
keycloak.admin.username=admin
keycloak.admin.password=admin

# JWT Configuration
jwt.secret=NexLanceSecretKeyForJWTTokenGenerationAndValidation2026
jwt.expiration=86400000

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:support.nexlance@gmail.com}
spring.mail.password=${MAIL_PASSWORD:kgpzuvybcxtymhnu}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2KB
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=-1

# Upload directory
file.upload-dir=uploads

# Backend URL for file access
backend.url=http://localhost:8084

# ? AJOUT : Eureka Client
# Le service s'enregistre sous le nom "user-service"
# Le Gateway le trouvera via lb://user-service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true