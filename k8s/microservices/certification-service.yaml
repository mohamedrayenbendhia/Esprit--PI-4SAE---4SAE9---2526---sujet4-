apiVersion: apps/v1
kind: Deployment
metadata:
  name: certification-service
  namespace: nexlance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: certification-service
  template:
    metadata:
      labels:
        app: certification-service
    spec:
      containers:
        - name: certification-service
          image: img-certification
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: SPRING_CLOUD_CONFIG_URI
              value: http://config-server:8888
---
apiVersion: v1
kind: Service
metadata:
  name: certification-service
  namespace: nexlance
spec:
  selector:
    app: certification-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
