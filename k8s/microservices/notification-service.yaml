apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: nexlance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: img-notification
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: SPRING_CLOUD_CONFIG_URI
              value: http://config-server:8888
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: nexlance
spec:
  selector:
    app: notification-service
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP
