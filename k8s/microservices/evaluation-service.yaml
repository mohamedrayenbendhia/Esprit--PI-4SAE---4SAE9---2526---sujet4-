apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
  namespace: nexlance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evaluation-service
  template:
    metadata:
      labels:
        app: evaluation-service
    spec:
      containers:
        - name: evaluation-service
          image: img-evaluation
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: SPRING_CLOUD_CONFIG_URI
              value: http://config-server:8888
---
apiVersion: v1
kind: Service
metadata:
  name: evaluation-service
  namespace: nexlance
spec:
  selector:
    app: evaluation-service
  ports:
    - port: 8085
      targetPort: 8085
  type: ClusterIP
