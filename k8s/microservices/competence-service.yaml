apiVersion: apps/v1
kind: Deployment
metadata:
  name: competence-service
  namespace: nexlance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: competence-service
  template:
    metadata:
      labels:
        app: competence-service
    spec:
      containers:
        - name: competence-service
          image: img-competence
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: SPRING_CLOUD_CONFIG_URI
              value: http://config-server:8888
---
apiVersion: v1
kind: Service
metadata:
  name: competence-service
  namespace: nexlance
spec:
  selector:
    app: competence-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
