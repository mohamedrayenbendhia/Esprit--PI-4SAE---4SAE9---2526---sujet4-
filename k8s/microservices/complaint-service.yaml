apiVersion: apps/v1
kind: Deployment
metadata:
  name: complaint-service
  namespace: nexlance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: complaint-service
  template:
    metadata:
      labels:
        app: complaint-service
    spec:
      containers:
        - name: complaint-service
          image: img-complaint
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8092
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: SPRING_CLOUD_CONFIG_URI
              value: http://config-server:8888
---
apiVersion: v1
kind: Service
metadata:
  name: complaint-service
  namespace: nexlance
spec:
  selector:
    app: complaint-service
  ports:
    - port: 8092
      targetPort: 8092
  type: ClusterIP
