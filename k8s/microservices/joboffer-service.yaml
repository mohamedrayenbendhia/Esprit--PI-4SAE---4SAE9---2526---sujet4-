apiVersion: apps/v1
kind: Deployment
metadata:
  name: joboffer-service
  namespace: nexlance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: joboffer-service
  template:
    metadata:
      labels:
        app: joboffer-service
    spec:
      containers:
        - name: joboffer-service
          image: img-joboffer
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8087
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: SPRING_CLOUD_CONFIG_URI
              value: http://config-server:8888
---
apiVersion: v1
kind: Service
metadata:
  name: joboffer-service
  namespace: nexlance
spec:
  selector:
    app: joboffer-service
  ports:
    - port: 8087
      targetPort: 8087
  type: ClusterIP
