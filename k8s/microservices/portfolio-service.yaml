apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-service
  namespace: nexlance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-service
  template:
    metadata:
      labels:
        app: portfolio-service
    spec:
      containers:
        - name: portfolio-service
          image: img-portfolio
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: SPRING_CLOUD_CONFIG_URI
              value: http://config-server:8888
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-service
  namespace: nexlance
spec:
  selector:
    app: portfolio-service
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
