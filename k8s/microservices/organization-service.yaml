apiVersion: apps/v1
kind: Deployment
metadata:
  name: organization-service
  namespace: nexlance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: organization-service
  template:
    metadata:
      labels:
        app: organization-service
    spec:
      containers:
        - name: organization-service
          image: img-organization
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9095
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: SPRING_CLOUD_CONFIG_URI
              value: http://config-server:8888
---
apiVersion: v1
kind: Service
metadata:
  name: organization-service
  namespace: nexlance
spec:
  selector:
    app: organization-service
  ports:
    - port: 9095
      targetPort: 9095
  type: ClusterIP
