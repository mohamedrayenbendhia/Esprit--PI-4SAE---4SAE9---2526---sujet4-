apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: nexlance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: img-user
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: SPRING_CLOUD_CONFIG_URI
              value: http://config-server:8888
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: nexlance
spec:
  selector:
    app: user-service
  ports:
    - port: 8084
      targetPort: 8084
  type: ClusterIP
